  guideObjectUrl = URL.createObjectURL(blob);
  $('step2').classList.remove('disabled');
  $('globalStatus').textContent = 'שלב 1: אשר מיקרופון';
});

$('micBtn').addEventListener('click', async () => {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });
    $('micStatus').textContent = 'מיקרופון גולמי אושר ✓';
    $('step3').classList.remove('disabled');
    $('globalStatus').textContent = 'שלב 2: הקלטה 1';
  } catch (err) {
    $('micStatus').textContent = 'שגיאה: ' + err.message;
  }
});

function runTake(takeNumber, statusEl, audioEl, doneCallback) {
  const guideAudioEl = new Audio(guideObjectUrl);
  const chunks = [];
  const recorder = new MediaRecorder(micStream);
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = async () => {
    const blob = new Blob(chunks, { type: chunks[0]?.type || 'audio/webm' });
    recordings[takeNumber] = await blob.arrayBuffer();
    audioEl.src = URL.createObjectURL(blob);
    audioEl.style.display = 'block';
    statusEl.textContent = `הקלטה ${takeNumber} הושלמה ✓`;
    doneCallback();
  };
  guideAudioEl.onended = () => recorder.stop();
  guideAudioEl.onerror = () => { statusEl.textContent = 'שגיאה בטעינת הגייד'; recorder.stop(); };
  statusEl.textContent = 'מקליט...';
  recorder.start();
  guideAudioEl.play().catch(err => {
    statusEl.textContent = 'שגיאת ניגון: ' + err.message;
    recorder.stop();
  });
}

$('rec1Btn').addEventListener('click', () => {
  $('rec1Btn').disabled = true;
  runTake(1, $('rec1Status'), $('rec1Audio'), () => {
    $('step4').classList.remove('disabled');
    $('globalStatus').textContent = 'שלב 3: הקלטה 2';
  });
});
$('rec2Btn').addEventListener('click', () => {
  $('rec2Btn').disabled = true;
  runTake(2, $('rec2Status'), $('rec2Audio'), () => {
    $('step5').classList.remove('disabled');
    $('globalStatus').textContent = 'שלב 4: ניתוח';
  });
});

async function decodeToMono(arrayBuffer) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const audioBuffer = await ctx.decodeAudioData(arrayBuffer.slice(0));
  const ch0 = audioBuffer.getChannelData(0);
  const sr = audioBuffer.sampleRate;
  ctx.close();
  return { data: ch0, sampleRate: sr };
}

function goertzelPower(samples, freq, sr) {
  const N = samples.length;
  if (N === 0) return 0;
  const k = Math.round(N * freq / sr);
  const omega = 2 * Math.PI * k / N;
  const coeff = 2 * Math.cos(omega);
  let sPrev = 0, sPrev2 = 0;
  for (let i = 0; i < N; i++) {
    const s = samples[i] + coeff * sPrev - sPrev2;
    sPrev2 = sPrev;
    sPrev = s;
  }
  return sPrev2 * sPrev2 + sPrev * sPrev - coeff * sPrev * sPrev2;
}

// Whole-file Goertzel - no local windowing, exactly as specified
function analyzeWholeFile(data, sr) {
  let tp = 0, cp = 0;
  for (const f of TARGET_FREQS) tp += goertzelPower(data, f, sr);
  for (const f of CONTROL_FREQS) cp += goertzelPower(data, f, sr);
  return 10 * Math.log10(tp / (cp || 1e-12));
}

$('analyzeBtn').addEventListener('click', async () => {
  const resultDiv = $('analysisResult');
  resultDiv.innerHTML = '<div class="status">מנתח...</div>';
  try {
    const take1 = await decodeToMono(recordings[1]);
    const take2 = await decodeToMono(recordings[2]);
    const db1 = analyzeWholeFile(take1.data, take1.sampleRate);
    const db2 = analyzeWholeFile(take2.data, take2.sampleRate);

    resultDiv.innerHTML = `
      <div class="result">
        <div>הקלטה 1: <span class="metric">${db1.toFixed(1)} dB</span></div>
        <div>הקלטה 2: <span class="metric">${db2.toFixed(1)} dB</span></div>
        <div class="spec">שיטה: Goertzel על כל קובץ ההקלטה בבת אחת (900+1350Hz מול 600+2000Hz)</div>
      </div>
    `;
  } catch (err) {
    resultDiv.innerHTML = `<div class="result bad">שגיאת ניתוח: ${err.message}</div>`;
  }
});
</script>
